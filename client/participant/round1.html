<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Connection 2026 | Round 1</title>

    <link rel="stylesheet" href="../assets/css/round.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="quiz-container">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <header class="quiz-header">

        <div class="logo-box">

            College Logo

        </div>

        <div class="header-content">

            <h1>CONNECTION 2026</h1>

            <p>Round 1 Quiz Competition</p>

        </div>

        <div class="team-box">

            <h3 id="teamName">TEAM01</h3>

            <p>Participant</p>

        </div>

    </header>





    <!-- ========================= -->
    <!-- Status -->
    <!-- ========================= -->

    <section class="status-row">

        <div class="status-card">

            <h4>Question</h4>

            <p id="questionNumber">1 / 20</p>

        </div>

        <div class="status-card">

            <h4>Timer</h4>

            <p id="timer">15:00</p>

        </div>

        <div class="status-card">

            <h4>Answered</h4>

            <p id="answeredCount">0</p>

        </div>

        <div class="status-card">

            <h4>Status</h4>

            <p id="saveStatus">Auto Saving...</p>

        </div>

    </section>





    <!-- ========================= -->
    <!-- Progress -->
    <!-- ========================= -->

    <section class="progress-section">

        <div class="progress">

            <div class="progress-fill" id="progressFill"></div>

        </div>

    </section>





    <!-- ========================= -->
    <!-- Question -->
    <!-- ========================= -->

    <section class="question-card">

        <h2 id="questionText">

            Loading Question...

        </h2>

    </section>





    <!-- ========================= -->
    <!-- Options -->
    <!-- ========================= -->

    <section class="options-grid">

        <button class="option-btn" data-option="A">

            <span>A</span>

            <p id="optionA">

                Option A

            </p>

        </button>

        <button class="option-btn" data-option="B">

            <span>B</span>

            <p id="optionB">

                Option B

            </p>

        </button>

        <button class="option-btn" data-option="C">

            <span>C</span>

            <p id="optionC">

                Option C

            </p>

        </button>

        <button class="option-btn" data-option="D">

            <span>D</span>

            <p id="optionD">

                Option D

            </p>

        </button>

    </section>





    <!-- ========================= -->
    <!-- Navigation -->
    <!-- ========================= -->

    <section class="navigation">

        <button id="prevBtn">

            ⬅ Previous

        </button>

        <button id="nextBtn">

            Next ➜

        </button>

    </section>





    <!-- ========================= -->
    <!-- Question Numbers -->
    <!-- ========================= -->

    <section class="navigator">

        <h3>Question Navigator</h3>

        <div class="navigator-grid" id="navigatorGrid">

            <!-- Generated by JS -->

        </div>

    </section>





    <!-- ========================= -->
    <!-- Submit -->
    <!-- ========================= -->

    <section class="submit-section">

        <button id="submitBtn">

            Submit Round 1

        </button>

    </section>





    <!-- ========================= -->
    <!-- Footer -->
    <!-- ========================= -->

    <footer>

        © 2026 Department of Information Technology

    </footer>

</div>

<script src="../assets/js/round.js"></script>

</body>

</html>
